name: Refresh YouTube playlist

on:
  schedule:
    - cron: '0 3 * * 1'   # 每週一 03:00 UTC 自動執行
  workflow_dispatch:       # 也可在 Actions 頁面手動觸發

permissions:
  contents: write          # 允許 commit & push videos.json

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch videos from YouTube
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: python scripts/fetch_videos.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.json
          git diff --cached --quiet \
            && echo "videos.json unchanged, skipping commit." \
            || (git commit -m "chore: refresh videos.json [skip ci]" && git push)
